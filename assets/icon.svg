<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Coffee Shop">
  <title>Coffee Shop</title>
  <defs>
    <!-- Left-to-right cream-to-tan gradient on the cup body, suggests a
         curved surface and gives the mug some dimension without going
         full glossy. -->
    <linearGradient id="cup" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fffaf0"/>
      <stop offset="65%"  stop-color="#f4e9d8"/>
      <stop offset="100%" stop-color="#d9b88c"/>
    </linearGradient>
  </defs>

  <!-- Brown rounded background. Color matches the default theme accent (#7b3f00). -->
  <rect width="512" height="512" rx="96" fill="#7b3f00"/>

  <!-- Two-tone saucer drawn before cup so the cup's front-of-base arc sits
       visibly on top of the saucer's tan band. -->
  <ellipse cx="256" cy="438" rx="186" ry="22" fill="#5a3a1b"/>
  <ellipse cx="256" cy="432" rx="186" ry="14" fill="#d9b88c"/>

  <!-- Handle. Drawn before the cup body so the body covers its inside edge. -->
  <path d="M 358 246 Q 442 246 442 304 Q 442 362 358 362"
        fill="none" stroke="#fffaf0" stroke-width="34" stroke-linecap="round"/>
  <path d="M 358 246 Q 442 246 442 304 Q 442 362 358 362"
        fill="none" stroke="#5a3a1b" stroke-width="6"/>

  <!-- Cup body: a cylinder seen at a slight downward angle, so the front of
       the rim AND the front of the base both show as arcs of the same
       ellipse (same rx/ry). Top arc is dipping toward the viewer (front of
       the open rim); bottom arc dips the same way (front of the base). The
       coffee surface ellipse drawn next sits flush with the top arc. -->
  <path d="M 158 200
           A 100 14 0 0 1 358 200
           L 358 420
           A 100 14 0 0 1 158 420
           Z"
        fill="url(#cup)" stroke="#5a3a1b" stroke-width="8" stroke-linejoin="round"/>

  <!-- Coffee surface: full rim ellipse, dark espresso so it contrasts with
       both the cream cup and the orange-brown background. Drawn AFTER the
       cup body so the cup body's front-of-rim arc tucks under the coffee. -->
  <ellipse cx="258" cy="200" rx="100" ry="14"
           fill="#3a2418" stroke="#5a3a1b" stroke-width="4"/>

  <!-- Small crema highlight on the upper-left of the coffee surface for a
       hint of reflected light. -->
  <ellipse cx="232" cy="197" rx="34" ry="4" fill="#a96a3f" opacity="0.55"/>

  <!-- Three steam wisps. stroke-linecap=round plus the same wavy path style
       across all three for a clear "hot drink" silhouette at any size. -->
  <path d="M 214 158 Q 238 130 214 102 Q 190 74 214 46"
        fill="none" stroke="#fffaf0" stroke-width="13" stroke-linecap="round" opacity="0.92"/>
  <path d="M 258 168 Q 282 140 258 112 Q 234 84 258 56"
        fill="none" stroke="#fffaf0" stroke-width="13" stroke-linecap="round" opacity="0.92"/>
  <path d="M 302 158 Q 326 130 302 102 Q 278 74 302 46"
        fill="none" stroke="#fffaf0" stroke-width="13" stroke-linecap="round" opacity="0.92"/>
</svg>
