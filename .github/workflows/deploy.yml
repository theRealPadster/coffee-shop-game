name: Deploy main to GitHub Pages

# Builds `main` and publishes the single-file bundle to the root of the
# `gh-pages` branch. Branch previews live in `gh-pages:branches/<name>/`
# alongside main (see preview.yml), so we deploy with `keep_files: true` to
# avoid wiping them.
#
# NOTE: For this to actually serve, the repo's Pages settings must be set to
# "Deploy from a branch" → `gh-pages` / `(root)`. The previous setup used the
# GitHub Actions source (actions/deploy-pages), which is incompatible with
# coexisting branch previews.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: .
          keep_files: true
          commit_message: "deploy(main): ${{ github.sha }}"
